<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Store</title>
</head>
<body>
    <header>
        <h3>Cadastre seu veiculo para vende mais rápido</h3>
    </header>
    <div>
        <div>
            <p>Formulario</p>
        </div>

        <div>
            <h1>Venda fácil seu carro</h1>
            <p>Descreva as características do seu carro e marque os opcionais que ele possui</p>
            <form>
                <div>
                    <label for="title">Título do anuncio <span>*</span></label>
                    <input type="text" name="title" id="title" placeholder="Um titulo para anunciar seu carro">
                </div>

                <div>
                    <label for="title">preço<span>*</span></label>
                    <input type="text" name="preco" id="preco" placeholder="defina o preço">
                </div>

                <div>
                    <label for="descricao">Descriçao <span>*</span></label>
                    <textarea name="descricao" id="descricao">Descreva seu veiculo</textarea>
                </div>

                <div>
                    <label for="marca">marca<span>*</span></label>
                    <input type="text" name="marca" id="marca" placeholder="Coloque a marca do seu veiculo">
                </div>

                <div>
                    <label for="modelo">modelo<span>*</span></label>
                    <input type="text" name="modelo" id="modelo" placeholder="Coloque o modelo do seu veiculo">
                </div>

                <div>
                    <label for="quilometragem">quilometragem</label>
                    <input type="number" name="quilometragem" id="quilometragem" placeholder="Quilometragem do veiculo">
                </div>

                <div>
                    <label for="data-de-compra">Data de compra <span>*</span></label>
                    <input type="data" name="data-de-compra" id="data-de-compra">
                </div>

                <div>
                    <p>Tipo de cambio</p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">Manual</label>
                    <input type="radio" name="marcha" id="auto">
                    <label for="auto">Automatico</label>
                </div>

                <div>
                    <p>opcionais</p>
                    <ul>
                        <li>
                            <input type="checkbox" name="opicioal[]" id="airbag" value="airbag">
                            <label for="airbag">airbag</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicioal[]" id="alarme" value="">
                            <label for="alarme">alarme</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicioal[]" id="ar-condicioado" value="ar-condicioado">
                            <label for="ar-condicioado">ar condicioado</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicioal[]" id="camera-de-re" value="camera-de-re">
                            <label for="camera-de-re">camera de ré</label>
                        </li>
                    </ul>
                        <div>
                    <ul>
                        <li>
                            <input type="checkbox" name="opicioal[]" id="assistente-de-pisca" value="assistente-de-pisca">
                            <label for="assistente-de-pisca">assistente de pisca</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicioal[]" id="partida-sem-chave" value="partida-sem-chave">
                            <label for="partida-sem-chave">partida sem chave</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicioal[]" id="integracao-com-celular" value="integracao-com-celular">
                            <label for="integracao-com-celular">integração com celular</label>
                        </li>
                        <li>
                            <input type="checkbox" name="opicioal[]" id="banco-de-couro" value="banco-de-couro">
                            <label for="banco-de-couro">banco de couro</label>
                        </li>
                    </ul>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
